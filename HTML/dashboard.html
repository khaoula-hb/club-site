<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ECC Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../CSS/style.css">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

  <div class="logo">
    <a href="home.html">
      <img src="../logo.png" alt="ECC Logo">
    </a>
  </div>

  <ul class="nav-links">
    <!-- JS WILL CONTROL NAVBAR -->
  </ul>

  <div class="theme-toggle" id="themeBtn">
    <i class="fa-solid fa-moon"></i>
  </div>

</nav>

<!-- ================= DASHBOARD ================= -->

<section class="dashboard-section">

  <!-- HEADER -->

  <div class="dashboard-header reveal">

    <div class="hero-badge">
      <i class="fa-solid fa-shield-halved"></i>
      Admin Panel
    </div>

    <h1>ECC Admin Dashboard 🚀</h1>

    <p>
      Manage Members • Community • Activities
    </p>

  </div>

  <!-- STATS -->

  <div class="stats-container">

    <div class="stat-card reveal">
      <i class="fa-solid fa-users"></i>
      <h2 id="membersCount">0</h2>
      <p>Members</p>
    </div>

    <div class="stat-card reveal">
      <i class="fa-solid fa-calendar"></i>
      <h2 id="eventsCount">0</h2>
      <p>Events</p>
    </div>

    <div class="stat-card reveal">
      <i class="fa-solid fa-trophy"></i>
      <h2>1</h2>
      <p>Collaborations</p>
    </div>

  </div>

  <!-- ================= MEMBERS ================= -->

  <div class="members-section reveal">

    <div class="section-title">
      <h2>Registered Members</h2>
      <p>Manage all ECC registered users</p>
    </div>

    <div class="search-box">

      <i class="fa-solid fa-magnifying-glass"></i>

      <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search members..."
      >

    </div>

    <div id="usersList" class="members-grid"></div>

  </div>

  <!-- ================= EVENTS MANAGEMENT ================= -->

  <div class="events-admin reveal">

    <div class="section-title">

      <h2>
        Manage Events
      </h2>

      <p>
        Add, edit and delete club events
      </p>

    </div>

    <form id="eventForm" class="event-form">

      <input
      type="text"
      id="eventTitle"
      placeholder="Event Title"
      required>

      <select id="eventCategory" required>

        <option value="">
          Select Category
        </option>

        <option value="collaboration">
          Collaboration
        </option>

        <option value="community">
          Community
        </option>

        <option value="coming">
          Coming Soon
        </option>

      </select>

      <input
      type="text"
      id="eventLocation"
      placeholder="Location"
      required>

      <input
      type="datetime-local"
      id="eventDate"
      required>

      <input
      type="url"
      id="eventImage"
      placeholder="Image URL"
      required>

      <textarea
      id="eventDescription"
      placeholder="Event Description"
      rows="4"
      required></textarea>

      <button type="submit" class="btn">

        <i class="fa-solid fa-plus"></i>
        Add Event

      </button>

    </form>

    <!-- EVENTS LIST -->

    <div
    id="eventsList"
    class="members-grid">
    </div>

  </div>

</section>

<!-- ================= JS ================= -->

<script src="../JS/app.js"></script>

</body>
</html>
