<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join ECC</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>ECC</h2>

  <ul class="nav-links">
    <li><a href="../HTML/home.html">Home</a></li>
    <li><a href="#">Join</a></li>
  </ul>
</nav>

<!-- JOIN -->
<div class="join-container" style="margin-top:80px;">
  <div class="join-box">

    <h2>Join Enter Capital Club 🚀</h2>

    <form id="registerForm">

      <input type="text" id="full_name" placeholder="Full Name" required class="input">
      <input type="email" id="email" placeholder="Email" required class="input">
      <input type="password" id="password" placeholder="Password" required class="input">

      <button type="submit" class="btn">Register</button>

    </form>

    <p id="message" style="margin-top:15px;"></p>

  </div>
</div>

<script src="../JS/app.js"></script>

</body>
</html>
