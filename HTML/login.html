<!-- LOGIN -->
<div class="login-container" style="margin-top:80px;">
  <div class="login-box ">

    <h2>Login 🔐</h2>

    <form id="loginForm">

      <input type="email" id="email" placeholder="Email" required class="input">
      <input type="password" id="password" placeholder="Password" required class="input">

      <button type="submit" class="btn">Login</button>

    </form>

    <p id="message" style="margin-top:15px;"></p>

  </div>
</div>

<script src="../JS/app.js"></script>
